name: 'Build Arch package'
description: >
  Set up an Arch base-devel container build environment, optionally install
  extra repo packages and run a pre-build hook (e.g. to install local .pkg
  files from artifacts), then run makepkg and stage the outputs into ./out.

inputs:
  pkg-dir:
    description: 'Subdirectory containing the PKGBUILD to build'
    required: true
  extra-pacman-pkgs:
    description: 'Extra pacman packages to install with pacman -Syu (space-separated)'
    required: false
    default: ''
  pre-build:
    description: |
      Bash script run after pacman setup and the build user has been created,
      but before makepkg. Use this to install local .pkg.tar.zst files
      downloaded as artifacts from earlier jobs.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Cache pacman packages
      uses: actions/cache@v5
      with:
        path: /var/cache/pacman/pkg
        key: pacman-${{ github.run_id }}
        restore-keys: pacman-

    - name: Restore ccache for ${{ inputs.pkg-dir }}
      uses: actions/cache@v5
      with:
        path: /home/builder/.ccache
        key: ccache-${{ inputs.pkg-dir }}-${{ github.run_id }}
        restore-keys: ccache-${{ inputs.pkg-dir }}-

    - name: Sync pacman, install tooling, enable ccache in makepkg
      shell: bash
      run: |
        pacman -Syu --needed --noconfirm git sudo ccache ${{ inputs.extra-pacman-pkgs }}
        # makepkg auto-prepends /usr/lib/ccache/bin to PATH when BUILDENV
        # contains 'ccache' (rather than '!ccache'). Default Arch flag is
        # negated, so we flip it here.
        sed -i 's/!ccache/ccache/' /etc/makepkg.conf

    - name: Create unprivileged build user and prepare ccache dir
      shell: bash
      run: |
        useradd -m builder 2>/dev/null || true
        echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
        # /home/builder/.ccache may already exist (restored from cache as
        # root). Reassign ownership to builder and cap the on-disk size so
        # the GHA cache quota per package stays manageable.
        mkdir -p /home/builder/.ccache
        chown -R builder:builder /home/builder/.ccache
        sudo -u builder ccache --max-size=1G

    - name: Run pre-build hook
      if: inputs.pre-build != ''
      shell: bash
      run: |
        ${{ inputs.pre-build }}

    - name: Build with makepkg
      shell: bash
      run: |
        chown -R builder:builder .
        cd "${{ inputs.pkg-dir }}"
        sudo -u builder makepkg -s --noconfirm

    - name: Show ccache stats
      shell: bash
      run: sudo -u builder ccache --show-stats

    - name: Stage outputs into ./out
      shell: bash
      run: |
        mkdir -p out
        cp "${{ inputs.pkg-dir }}"/*.pkg.tar.zst out/
        ls -la out/
