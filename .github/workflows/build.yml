name: Build XLibre packages

# Build order as dictated by the upstream dependency graph:
#
#   1. xserver               bootstrapped against xorg-server-devel from [extra]
#
#   2. libinput-bootstrap    libinput's configure does PKG_CHECK_MODULES on
#                            xorg-server >= 25.0.0 and its PKGBUILD depends
#                            on xlibre-xserver-git, which transitively needs
#                            libinput itself. We break the cycle by force-
#                            installing the xlibre xserver chain with -Udd
#                            alongside Arch's stock xf86-input-libinput as
#                            an input-driver stand-in, then building libinput
#                            against that "dirty" environment.
#
#   3. libinput              Clean stage-2 rebuild: install the stage-1
#                            libinput cleanly alongside the xlibre xserver
#                            chain (no -Udd, no --nodeps - pacman resolves
#                            the four local packages as one transaction now
#                            that libinput exists) and rebuild libinput in
#                            a properly-formed xlibre environment. This is
#                            the package that ships in the Release.
#
#   4. drivers (matrix)      All other input/video drivers, built in parallel
#                            against the stage-2 libinput + full xserver.
#
#   5. release               Collects every shipping artifact (excluding the
#                            intermediate stage-1 bootstrap) and publishes a
#                            single Release.

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish a GitHub Release with the built packages'
        type: boolean
        default: true
      drivers:
        description: 'Also build libinput and the driver matrix (longer build time)'
        type: boolean
        default: true

permissions:
  contents: write          # required to create the Release and push the tag

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the xserver bootstrap package
  # ---------------------------------------------------------------------------
  xserver-bootstrap:
    name: Build xlibre-xserver-bootstrap
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Sync pacman and add tooling
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo xorg-server-devel

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Build with makepkg
        run: |
          chown -R builder:builder .
          cd xlibre-xserver-bootstrap
          sudo -u builder makepkg -s --noconfirm

      - name: Stage outputs
        run: |
          mkdir -p out
          cp xlibre-xserver-bootstrap/*.pkg.tar.zst out/
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: xlibre-bootstrap
          path: out/*.pkg.tar.zst
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Stage 1: Bootstrap libinput against the xlibre-xserver-bootstrap package.
  #             This artifact is intermediate and is NOT shipped in the Release.
  # ---------------------------------------------------------------------------
  libinput-bootstrap:
    name: Build xlibre-input-libinput (bootstrap)
    needs: xserver-bootstrap
    if: github.event_name == 'schedule' || inputs.drivers
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Sync pacman and add tooling
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo

      - name: Download Arch's xf86-input-libinput as a local .pkg file
        run: |
          # -Sw downloads to /var/cache/pacman/pkg/ without installing, so we
          # can hand the .pkg.tar.zst file directly to pacman -Udd alongside
          # the xlibre packages in one atomic transaction.
          pacman -Sw --noconfirm xf86-input-libinput

      - uses: actions/download-artifact@v4
        with:
          name: xlibre-bootstrap
          path: xserver-bootstrap

      - name: Force-install xlibre xserver chain + stock xf86-input-libinput
        run: |
          pacman -U --noconfirm \
            xserver-bootstrap/*.pkg.tar.zst \
            /var/cache/pacman/pkg/xf86-input-libinput-*.pkg.tar.zst

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Build with makepkg (stage 1 output)
        run: |
          chown -R builder:builder .
          cd xlibre-input-libinput-git
          sudo -u builder makepkg -s --noconfirm

      - name: Stage outputs
        run: |
          mkdir -p out
          cp xlibre-input-libinput-git/*.pkg.tar.zst out/
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: libinput-bootstrap
          path: out/*.pkg.tar.zst
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. Build the xserver split package (produces 6 .pkg.tar.zst files)
  # ---------------------------------------------------------------------------
  xserver:
    name: Build xlibre-xserver-git
    needs: libinput-bootstrap
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    outputs:
      tag: ${{ steps.stage.outputs.tag }}

    steps:
      - name: Sync pacman and add tooling
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo xorg-server-devel

      - uses: actions/download-artifact@v4
        with:
          name: libinput-bootstrap
          path: xserver-pkgs

      - name: Install bootstrapped libinput
        run: |
          pacman -U --needed --noconfirm xserver-pkgs/xlibre-input-libinput-git-*.pkg.tar.zst

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Build with makepkg
        run: |
          chown -R builder:builder .
          cd xlibre-xserver-git
          sudo -u builder makepkg -s --noconfirm

      - name: Stage outputs and compute release tag
        id: stage
        run: |
          mkdir -p out
          cp xlibre-xserver-git/*.pkg.tar.zst out/
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG="nightly-$(date -u +%Y%m%d)-${SHORT_SHA}.${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: xlibre-server
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Stage 2: clean rebuild of libinput against the full xlibre xserver +
  #             stage-1 libinput. This is the package that ships.
  # ---------------------------------------------------------------------------
  libinput:
    name: Build xlibre-input-libinput
    needs: [xserver, libinput-bootstrap]
    if: github.event_name == 'schedule' || inputs.drivers
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Sync pacman and add tooling
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo

      - uses: actions/download-artifact@v4
        with:
          name: xlibre-server
          path: xserver-pkgs

      - uses: actions/download-artifact@v4
        with:
          name: libinput-bootstrap
          path: libinput-bootstrap

      - name: Install the full xlibre chain cleanly
        run: |
          # libinput now exists, so pacman resolves the four local packages
          # as a single transaction with no -Udd, no --nodeps, no overwrites.
          pacman -U --noconfirm \
            libinput-bootstrap/*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-common-git-*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-git-*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-devel-git-*.pkg.tar.zst

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Build with makepkg (stage 2 output, final)
        run: |
          chown -R builder:builder .
          cd xlibre-input-libinput-git
          sudo -u builder makepkg -s --noconfirm

      - name: Stage outputs
        run: |
          mkdir -p out
          cp xlibre-input-libinput-git/*.pkg.tar.zst out/
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: xlibre-input-libinput
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Build each remaining driver against the full xlibre xserver + libinput
  # ---------------------------------------------------------------------------
  drivers:
    name: Build ${{ matrix.pkg }}
    needs: [xserver, libinput]
    if: github.event_name == 'schedule' || inputs.drivers
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    strategy:
      fail-fast: false
      matrix:
        # xlibre-input-libinput is built in its own two-stage job above and
        # is NOT in this matrix. Add/remove from the list to taste.
        # Full set available upstream:
        #   xlibre-input-elographics  xlibre-input-evdev    xlibre-input-joystick
        #   xlibre-input-mouse        xlibre-input-synaptics
        #   xlibre-input-vmmouse      xlibre-input-void     xlibre-input-wacom
        #   xlibre-video-amdgpu       xlibre-video-ati      xlibre-video-dummy
        #   xlibre-video-fbdev        xlibre-video-intel    xlibre-video-nouveau
        #   xlibre-video-qxl          xlibre-video-sisusb   xlibre-video-vesa
        #   xlibre-video-vmware       xlibre-video-voodoo
        pkg:
          - xlibre-input-evdev
          - xlibre-input-synaptics
          - xlibre-input-wacom
          - xlibre-video-amdgpu
          - xlibre-video-ati
          - xlibre-video-intel
          - xlibre-video-nouveau
          - xlibre-video-vesa
          - xlibre-video-fbdev
          - xlibre-video-qxl
          - xlibre-video-vmware

    steps:
      - name: Sync pacman and add tooling
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo

      - uses: actions/download-artifact@v4
        with:
          name: xlibre-server
          path: xserver-pkgs

      - uses: actions/download-artifact@v4
        with:
          name: xlibre-input-libinput
          path: libinput-pkgs

      - name: Install the full xlibre xserver chain
        run: |
          pacman -U --noconfirm \
            libinput-pkgs/xlibre-input-libinput-git-*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-common-git-*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-git-*.pkg.tar.zst \
            xserver-pkgs/xlibre-xserver-devel-git-*.pkg.tar.zst

      - name: Create unprivileged build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Build with makepkg
        run: |
          chown -R builder:builder .
          cd ${{ matrix.pkg }}
          sudo -u builder makepkg -s --noconfirm

      - name: Stage outputs
        run: |
          mkdir -p out
          cp ${{ matrix.pkg }}/*.pkg.tar.zst out/
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: driver-${{ matrix.pkg }}
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 6. Collect every shipping artifact and publish a single Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [xserver, libinput, drivers]
    # Release if the xserver succeeded and the user asked for it. libinput
    # and drivers are treated as best-effort - a failed individual driver
    # leaves it out of the Release but does not block publishing.
    if: |
      always() &&
      needs.xserver.result == 'success' &&
      (github.event_name == 'schedule' || inputs.release)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts (skip the stage-1 bootstrap)
        run: |
          mkdir -p release
          find artifacts \
            -name '*.pkg.tar.zst' \
            -not -path '*/libinput-bootstrap/*' \
            -exec cp -v {} release/ \;
          ls -la release/

      - name: Generate release notes
        run: |
          {
            echo "Automated build of the XLibre Arch Linux packages."
            echo ""
            echo "**PKGBUILD commit:** \`${GITHUB_SHA}\`"
            echo "**Built:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "## Packages included"
            echo ""
            for f in release/*.pkg.tar.zst; do
              [ -e "$f" ] || continue
              echo "- \`$(basename "$f")\`"
            done
            echo ""
            echo "## Installation"
            echo ""
            echo 'Download what you need and install with `sudo pacman -U <file>.pkg.tar.zst`.'
            echo "Order matters: install \`xlibre-input-libinput-git\` first,"
            echo "then \`xlibre-xserver-common-git\`, \`xlibre-xserver-git\` and \`xlibre-xserver-devel-git\`"
            echo "in one pacman call, then the rest of the drivers."
            echo "See the [official XLibre Arch procedure](https://github.com/X11Libre/pkgbuilds-arch-based#packages-build-procedure) for the full swap-from-xorg-server walkthrough."
            echo ""
            echo "These are unsigned builds of HEAD-of-master code. Use at your own risk."
          } > release_notes.md
          cat release_notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.xserver.outputs.tag }}
          name: XLibre ${{ needs.xserver.outputs.tag }}
          files: release/*.pkg.tar.zst
          body_path: release_notes.md
          prerelease: true
