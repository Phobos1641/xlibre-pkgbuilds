name: Build XLibre packages

# Build pipeline:
#   0. discover-drivers      Reads xlibre-{input,video}-* dirs from the repo
#                            and emits a JSON matrix for the drivers job.
#   1. xserver-bootstrap     A standalone bootstrap of the xserver, built
#                            against xorg-server-devel from [extra].
#   2. libinput-bootstrap    Stage-1 libinput, built against the bootstrap
#                            xserver + Arch's stock xf86-input-libinput.
#   3. xserver               The real xlibre-xserver-git split package, built
#                            with the bootstrap libinput pre-installed so its
#                            depends= array is satisfied.
#   4. libinput              Stage-2 libinput, clean rebuild against the full
#                            xlibre xserver chain. This is the shipping copy.
#   5. drivers (matrix)      All other input/video drivers, built in parallel.
#   6. release               Collects shipping artifacts (skipping any
#                            *-bootstrap intermediates) and publishes a single
#                            Release, then prunes older nightly prereleases.
#
# All build jobs share a composite action at .github/actions/build-arch-pkg
# that handles the Arch container preamble (pacman cache, sync, builder user,
# pre-build hook, makepkg, output staging).

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish a GitHub Release with the built packages'
        type: boolean
        default: true
      drivers:
        description: 'Also build libinput and the driver matrix (longer build time)'
        type: boolean
        default: true

# Default to read-only; the release job grants itself write where it needs it.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 0. Discover which driver PKGBUILDs exist in this fork.
  #    Exclude libinput (built in its own two-stage job) and any *-bootstrap.
  #    Add patterns to the grep below to skip specific drivers if needed.
  # ---------------------------------------------------------------------------
  discover-drivers:
    name: Discover driver packages
    if: inputs.drivers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        run: |
          MATRIX=$(ls -d xlibre-input-* xlibre-video-* 2>/dev/null \
            | grep -vE '^xlibre-input-libinput-' \
            | grep -vE -- '-bootstrap$' \
            | jq -R . | jq -sc .)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Drivers to build: ${MATRIX}"

  # ---------------------------------------------------------------------------
  # 1. Bootstrap xserver - built against [extra]'s xorg-server-devel.
  # ---------------------------------------------------------------------------
  xserver-bootstrap:
    name: Build xlibre-xserver-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build-arch-pkg
        with:
          pkg-dir: xlibre-xserver-bootstrap
          extra-pacman-pkgs: xorg-server-devel
      - uses: actions/upload-artifact@v7
        with:
          name: xlibre-xserver-bootstrap
          path: out/*.pkg.tar.zst
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Stage-1 libinput - bootstrap xserver installed alongside Arch's stock
  #    xf86-input-libinput as an input-driver stand-in.
  # ---------------------------------------------------------------------------
  libinput-bootstrap:
    name: Build xlibre-input-libinput-bootstrap
    needs: xserver-bootstrap
    if: inputs.drivers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-xserver-bootstrap
          path: xserver-bootstrap
      - uses: ./.github/actions/build-arch-pkg
        with:
          pkg-dir: xlibre-input-libinput-git
          pre-build: |
            # -Sw downloads xf86-input-libinput to /var/cache/pacman/pkg/
            # without installing, so it can be installed atomically alongside
            # the bootstrap xserver in a single pacman -U transaction.
            pacman -Sw --noconfirm xf86-input-libinput
            pacman -U --noconfirm \
              xserver-bootstrap/*.pkg.tar.zst \
              /var/cache/pacman/pkg/xf86-input-libinput-*.pkg.tar.zst
      - uses: actions/upload-artifact@v7
        with:
          name: xlibre-input-libinput-bootstrap
          path: out/*.pkg.tar.zst
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 3. The real xserver split package (produces 6 .pkg.tar.zst files).
  # ---------------------------------------------------------------------------
  xserver:
    name: Build xlibre-xserver-git
    needs: libinput-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: archlinux:base-devel
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-input-libinput-bootstrap
          path: libinput-bootstrap
      - uses: ./.github/actions/build-arch-pkg
        with:
          pkg-dir: xlibre-xserver-git
          extra-pacman-pkgs: xorg-server-devel
          pre-build: |
            pacman -U --needed --noconfirm \
              libinput-bootstrap/xlibre-input-libinput-git-*.pkg.tar.zst
      - name: Compute release tag
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "tag=nightly-$(date -u +%Y%m%d)-${SHORT_SHA}.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: xlibre-xserver
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Stage-2 libinput - clean rebuild against the full xlibre xserver chain.
  # ---------------------------------------------------------------------------
  libinput:
    name: Build xlibre-input-libinput-git
    needs: [xserver, libinput-bootstrap]
    if: inputs.drivers
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-xserver
          path: xserver-pkgs
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-input-libinput-bootstrap
          path: libinput-bootstrap
      - uses: ./.github/actions/build-arch-pkg
        with:
          pkg-dir: xlibre-input-libinput-git
          pre-build: |
            pacman -U --noconfirm \
              libinput-bootstrap/*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-common-git-*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-git-*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-devel-git-*.pkg.tar.zst
      - uses: actions/upload-artifact@v7
        with:
          name: xlibre-input-libinput-git
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Every other driver, in parallel.
  # ---------------------------------------------------------------------------
  drivers:
    name: Build ${{ matrix.pkg }}
    needs: [discover-drivers, xserver, libinput]
    if: inputs.drivers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Allow individual matrix entries to fail without failing the workflow.
    # Each failed driver is still visible (red X) on the run's page, but the
    # overall run reports success so no failure email is sent. The release
    # job's flatten step picks up whatever did succeed.
    continue-on-error: true
    container:
      image: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.discover-drivers.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-xserver
          path: xserver-pkgs
      - uses: actions/download-artifact@v7
        with:
          name: xlibre-input-libinput-git
          path: libinput-pkgs
      - uses: ./.github/actions/build-arch-pkg
        with:
          pkg-dir: ${{ matrix.pkg }}
          pre-build: |
            pacman -U --noconfirm \
              libinput-pkgs/xlibre-input-libinput-git-*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-common-git-*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-git-*.pkg.tar.zst \
              xserver-pkgs/xlibre-xserver-devel-git-*.pkg.tar.zst
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.pkg }}
          path: out/*.pkg.tar.zst
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 6. Collect shipping artifacts, publish a single Release, prune old ones.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [discover-drivers, xserver, libinput, drivers]
    # Release if the xserver succeeded and the user asked for it. libinput
    # and drivers are best-effort - a failed individual driver leaves it out
    # of the Release but does not block publishing.
    if: |
      always() &&
      needs.xserver.result == 'success' &&
      inputs.release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # narrow write scope to this job only

    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Flatten artifacts (skip *-bootstrap intermediates)
        run: |
          mkdir -p release
          find artifacts \
            -name '*.pkg.tar.zst' \
            -not -path '*-bootstrap/*' \
            -exec cp -v {} release/ \;
          ls -la release/

      - name: Diff built drivers against the discovered matrix
        if: needs.discover-drivers.result == 'success'
        run: |
          MATRIX='${{ needs.discover-drivers.outputs.matrix }}'
          if [ -z "$MATRIX" ] || [ "$MATRIX" = "[]" ]; then
            echo "Empty matrix; nothing to diff."
            exit 0
          fi

          # Extract <pkgname> from each .pkg.tar.zst by stripping the trailing
          # -<pkgver>-<pkgrel>-<arch> components per Arch's naming convention.
          BUILT=$(for f in release/*.pkg.tar.zst; do
            [ -e "$f" ] || continue
            basename "$f" .pkg.tar.zst | sed -E 's/-[^-]+-[^-]+-[^-]+$//'
          done | sort -u)

          EXPECTED=$(jq -r '.[]' <<< "$MATRIX" | sort -u)
          MISSING=$(comm -23 <(echo "$EXPECTED") <(echo "$BUILT"))

          if [ -n "$MISSING" ]; then
            {
              echo "## :warning: Drivers that failed to build"
              echo ""
              echo "The following drivers were in the build matrix but did not produce a package:"
              echo ""
              echo "$MISSING" | sed 's/^/- `/; s/$/`/'
              echo ""
              echo "Check the failed matrix entries on this run's page for build logs."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Missing drivers: $(echo "$MISSING" | tr '\n' ' ')"
          else
            echo "## :white_check_mark: All discovered drivers built successfully" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate release notes
        run: |
          {
            echo "Automated build of the XLibre Arch Linux packages."
            echo ""
            echo "**PKGBUILD commit:** \`${GITHUB_SHA}\`"
            echo "**Built:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            echo "## Packages included"
            echo ""
            for f in release/*.pkg.tar.zst; do
              [ -e "$f" ] || continue
              echo "- \`$(basename "$f")\`"
            done
            echo ""
            echo "## Installation"
            echo ""
            echo 'Download what you need and install with `sudo pacman -U <file>.pkg.tar.zst`.'
            echo "Order matters: install \`xlibre-input-libinput(-git)\` first,"
            echo "then \`xlibre-xserver-common-git\`, \`xlibre-xserver-git\` and \`xlibre-xserver-devel-git\`"
            echo "in one pacman call, then the rest of the drivers."
            echo "See the [official XLibre Arch procedure](https://github.com/X11Libre/pkgbuilds-arch-based#packages-build-procedure) for the full swap-from-xorg-server walkthrough."
            echo ""
            echo "These are unsigned builds of HEAD-of-master code. Use at your own risk."
          } > release_notes.md
          cat release_notes.md

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.xserver.outputs.tag }}
          name: XLibre ${{ needs.xserver.outputs.tag }}
          files: release/*.pkg.tar.zst
          body_path: release_notes.md
          prerelease: true

      - name: Prune old nightly prereleases (keep 5 newest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list \
            --repo "${{ github.repository }}" \
            --limit 100 \
            --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")))]
                  | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | xargs -r -n1 -I{} gh release delete \
                --repo "${{ github.repository }}" {} --yes --cleanup-tag
